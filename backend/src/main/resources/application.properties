# ======================
# APP
# ======================
spring.application.name=e-commerce3
server.port=8080

# ======================
# BASE DE DATOS (MySQL)
# ======================
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_definitivo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ======================
# JPA / HIBERNATE
# ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto (recomendado explícito)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ======================
# JWT
# ======================
jwt.secret=clave_super_simple_para_jwt_123456789012345
jwt.expiration=86400000

# ======================
# LOGGING (opcional pero útil)
# ======================
logging.level.org.springframework.security=DEBUG
